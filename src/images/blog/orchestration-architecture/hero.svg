<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <!-- Purple glow for center stage -->
    <radialGradient id="orchestrateGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Connector gradient -->
    <linearGradient id="connectorLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#444444"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="connectorRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#444444"/>
    </linearGradient>
    <!-- Top glow -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <!-- Stage box gradients -->
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="orchestrateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="serveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <!-- Grid overlay -->
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Top purple glow -->
  <rect width="1600" height="900" fill="url(#topGlow)"/>

  <!-- Center orchestrate glow -->
  <ellipse cx="800" cy="580" rx="320" ry="200" fill="url(#orchestrateGlow)"/>

  <!-- Zephyr logo mark (top left) -->
  <g transform="translate(72, 60) scale(0.52)">
    <path d="M92 89.1563C92 74.4962 103.75 62.6094 118.247 62.6094C123.773 62.6094 128.9 64.3359 133.131 67.2867L140.818 59.5084C126.311 48.1746 105.397 49.2408 92.0928 62.7132C82.1111 72.8159 79.0259 87.2612 82.8363 100.042C83.4497 102.101 82.7097 104.385 80.8693 105.459C78.6938 106.73 75.8916 105.816 75.1151 103.399C73.677 98.9263 72.8999 94.1549 72.8999 89.1972C72.8999 76.5201 77.9749 65.0396 86.1808 56.7244L86.3741 56.5294C94.5662 48.3258 105.824 43.2627 118.219 43.2627C123.637 43.2627 128.831 44.2317 133.644 46.0097L135.875 46.8647C140.046 48.6478 144.323 50.141 148.649 51.3448C150.79 51.9404 152.944 52.4652 155.108 52.9187C157.119 53.3405 157.944 56.1428 156.497 57.7668L139.337 76.9991C142.271 81.7695 143.991 87.5534 143.991 93.7886C143.991 108.449 132.241 120.336 117.744 120.336C112.218 120.336 107.091 118.609 102.86 115.659L95.1731 123.437C109.68 134.771 130.594 133.705 143.898 120.232C153.879 110.13 156.965 95.6842 153.154 82.9036C152.541 80.8442 153.281 78.5602 155.121 77.4864C157.297 76.2162 160.099 77.1296 160.875 79.5465C162.314 84.0195 163.091 88.7912 163.091 93.7491C163.091 106.426 158.016 117.907 149.81 126.222L149.617 126.417C141.424 134.62 130.167 139.684 117.771 139.684C112.353 139.684 107.159 138.715 102.346 136.937L100.115 136.082C95.9441 134.299 91.6672 132.805 87.3415 131.601C85.2002 131.006 83.0461 130.481 80.8823 130.027C78.8713 129.606 78.0464 126.803 79.4935 125.179L96.6531 105.947C93.7199 101.177 92 95.3929 92 89.1563ZM118.691 111.893C128.636 111.893 136.699 103.83 136.699 93.8851C136.699 90.7798 135.914 87.8562 134.534 85.3055L110.12 109.72C112.67 111.108 115.588 111.893 118.691 111.893ZM118.691 66.4199C108.747 66.4199 100.684 74.483 100.684 84.4275C100.684 87.7811 101.599 90.9208 103.191 93.6089L127.87 68.9304C125.182 67.3378 122.042 66.4199 118.691 66.4199Z" fill="white"/>
  </g>

  <!-- "Zephyr Cloud" wordmark next to logo -->
  <text x="148" y="105" fill="white" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="0.02em">ZEPHYR CLOUD</text>

  <!-- Main headline -->
  <text font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-weight="500" letter-spacing="-0.04em" fill="white">
    <tspan x="78" y="270" font-size="82">Why Orchestration is</tspan>
    <tspan x="78" y="365" font-size="82">the Missing Layer in</tspan>
    <tspan x="78" y="460" font-size="82">Your Deployment Stack</tspan>
  </text>

  <!-- Subheading / tagline -->
  <text x="78" y="530" fill="#6D6D6D" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" letter-spacing="-0.02em">The orchestration architecture for modern organizations.</text>

  <!-- ─── Three-stage pipeline diagram ─── -->

  <!-- Stage 1: BUILD box -->
  <rect x="100" y="600" width="300" height="140" rx="12" fill="url(#buildGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  <text x="250" y="655" fill="#888888" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" text-anchor="middle">STAGE 0</text>
  <text x="250" y="695" fill="white" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="-0.03em" text-anchor="middle">Build</text>
  <text x="250" y="725" fill="#555555" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" text-anchor="middle">Bundler plugins</text>

  <!-- Connector left arrow -->
  <line x1="400" y1="670" x2="508" y2="670" stroke="url(#connectorLeft)" stroke-width="1.5"/>
  <polygon points="510,663 524,670 510,677" fill="#7c3aed"/>
  <!-- Dots on connector -->
  <circle cx="432" cy="670" r="3" fill="#333"/>
  <circle cx="456" cy="670" r="3" fill="#444"/>
  <circle cx="480" cy="670" r="3" fill="#555"/>

  <!-- Stage 2: ORCHESTRATE box (center, highlighted) -->
  <rect x="524" y="585" width="352" height="170" rx="12" fill="url(#orchestrateGrad)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Glow border effect -->
  <rect x="524" y="585" width="352" height="170" rx="12" fill="none" stroke="#7c3aed" stroke-width="6" stroke-opacity="0.12"/>
  <text x="700" y="640" fill="#a78bfa" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" text-anchor="middle">STAGE 1</text>
  <text x="700" y="682" fill="white" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="-0.03em" text-anchor="middle">Orchestrate</text>
  <text x="700" y="714" fill="#7c6aaa" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" text-anchor="middle">Version · CDN · Governance</text>
  <!-- Small badge showing multi-CDN -->
  <rect x="610" y="728" width="180" height="24" rx="12" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>
  <text x="700" y="745" fill="#a78bfa" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" letter-spacing="0.04em" text-anchor="middle">7 CDN PROVIDERS</text>

  <!-- Connector right arrow -->
  <line x1="876" y1="670" x2="984" y2="670" stroke="url(#connectorRight)" stroke-width="1.5"/>
  <polygon points="986,663 1000,670 986,677" fill="#444444"/>
  <!-- Dots on connector -->
  <circle cx="908" cy="670" r="3" fill="#555"/>
  <circle cx="932" cy="670" r="3" fill="#444"/>
  <circle cx="956" cy="670" r="3" fill="#333"/>

  <!-- Stage 3: SERVE box -->
  <rect x="1000" y="600" width="300" height="140" rx="12" fill="url(#serveGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  <text x="1150" y="655" fill="#888888" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.12em" text-anchor="middle">STAGE 2</text>
  <text x="1150" y="695" fill="white" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="-0.03em" text-anchor="middle">Serve</text>
  <text x="1150" y="725" fill="#555555" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" text-anchor="middle">Edge · Global · &lt;50ms</text>

  <!-- Bottom stat pills -->
  <rect x="100" y="790" width="220" height="36" rx="18" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="210" y="814" fill="#888888" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="-0.01em" text-anchor="middle">13 bundlers supported</text>

  <rect x="340" y="790" width="200" height="36" rx="18" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="440" y="814" fill="#888888" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="-0.01em" text-anchor="middle">Immutable versions</text>

  <rect x="558" y="790" width="200" height="36" rx="18" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="658" y="814" fill="#888888" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="-0.01em" text-anchor="middle">Full audit trail</text>

  <rect x="776" y="790" width="220" height="36" rx="18" fill="#111111" stroke="#222222" stroke-width="1"/>
  <text x="886" y="814" fill="#888888" font-family="'Avenir Next', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="-0.01em" text-anchor="middle">Zero vendor lock-in</text>

  <!-- Decorative vertical accent line left edge -->
  <rect x="0" y="0" width="3" height="900" fill="url(#connectorLeft)" opacity="0.4"/>
</svg>
