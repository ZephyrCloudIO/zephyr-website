<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="360" fill="#050615"/>
  <text x="60" y="36" fill="#E2E8F0" font-size="18" font-family="Inter, Arial, sans-serif">SSR request path (example app)</text>

  <g fill="#0B0F1A" stroke="#2D3748" stroke-width="1.5">
    <rect x="60" y="120" width="200" height="120" rx="16"/>
    <rect x="360" y="90" width="260" height="180" rx="16"/>
    <rect x="720" y="120" width="240" height="120" rx="16"/>
  </g>

  <g fill="#E2E8F0" font-size="14" font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="160" y="170">Browser</text>
    <text x="160" y="190" fill="#94A3B8" font-size="12">GET /</text>

    <text x="490" y="165">SSR snapshot</text>
    <text x="490" y="185" fill="#94A3B8" font-size="12">edge isolate</text>
    <text x="490" y="210" fill="#94A3B8" font-size="12">useFetch('/api/hello', { server: true })</text>

    <text x="840" y="170">/api/hello</text>
    <text x="840" y="190" fill="#94A3B8" font-size="12">ok, time, requestId</text>
  </g>

  <g stroke="#00DC82" stroke-width="2" fill="none">
    <line x1="260" y1="180" x2="360" y2="180"/>
    <line x1="620" y1="180" x2="720" y2="180"/>
    <line x1="720" y1="210" x2="620" y2="210"/>
    <line x1="360" y1="210" x2="260" y2="210"/>
  </g>

  <g fill="#00DC82">
    <polygon points="360,180 350,175 350,185"/>
    <polygon points="720,180 710,175 710,185"/>
    <polygon points="620,210 630,205 630,215"/>
    <polygon points="260,210 270,205 270,215"/>
  </g>

  <text x="60" y="310" fill="#94A3B8" font-size="12" font-family="Inter, Arial, sans-serif">requestId = x-request-id header or generated fallback</text>
</svg>
