<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="360" fill="#050615"/>
  <text x="60" y="36" fill="#E2E8F0" font-size="18" font-family="Inter, Arial, sans-serif">Nuxt build → Zephyr snapshot</text>

  <g fill="#0B0F1A" stroke="#2D3748" stroke-width="1.5">
    <rect x="40" y="70" width="180" height="70" rx="14"/>
    <rect x="250" y="70" width="250" height="70" rx="14"/>
    <rect x="530" y="70" width="270" height="70" rx="14"/>
    <rect x="830" y="70" width="170" height="70" rx="14"/>

    <rect x="180" y="210" width="240" height="70" rx="14"/>
    <rect x="450" y="210" width="240" height="70" rx="14"/>
    <rect x="720" y="210" width="200" height="70" rx="14"/>
  </g>

  <g fill="#E2E8F0" font-size="13" font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="130" y="106">nuxt build</text>
    <text x="375" y="100">Nuxt close hook</text>
    <text x="375" y="118" fill="#94A3B8" font-size="11">(skips dev)</text>

    <text x="665" y="100">resolve output + entrypoint</text>
    <text x="665" y="118" fill="#94A3B8" font-size="11">outputDir | nitro.output | .output</text>

    <text x="915" y="102">snapshotType</text>
    <text x="915" y="120" fill="#94A3B8" font-size="11">default: SSR if entrypoint</text>

    <text x="300" y="246">assetsRoot + files</text>
    <text x="300" y="264" fill="#94A3B8" font-size="11">SSR: outputDir | CSR: publicDir</text>

    <text x="570" y="248">upload_assets</text>
    <text x="570" y="266" fill="#94A3B8" font-size="11">assetsMap + buildStats</text>

    <text x="820" y="248">build_finished</text>
  </g>

  <g stroke="#00DC82" stroke-width="2" fill="none">
    <line x1="220" y1="105" x2="250" y2="105"/>
    <line x1="500" y1="105" x2="530" y2="105"/>
    <line x1="800" y1="105" x2="830" y2="105"/>

    <line x1="915" y1="140" x2="915" y2="210"/>

    <line x1="420" y1="245" x2="450" y2="245"/>
    <line x1="690" y1="245" x2="720" y2="245"/>
  </g>

  <g fill="#00DC82">
    <polygon points="250,105 242,100 242,110"/>
    <polygon points="530,105 522,100 522,110"/>
    <polygon points="830,105 822,100 822,110"/>
    <polygon points="915,210 910,202 920,202"/>
    <polygon points="450,245 442,240 442,250"/>
    <polygon points="720,245 712,240 712,250"/>
  </g>
</svg>
